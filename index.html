<!DOCTYPE html>
<html lang="ar" dir="rtl" data-page-title-key="hero.title">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="flag.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عظمة وجلال مصر | The Glory of Egypt</title>
  <meta name="description" content="مبادرة عظمة وجلال مصر — إرث سبعة آلاف عام يضيء المستقبل." />

  <link id="bootstrap-css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700;900&family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav id="site-nav" class="navbar navbar-expand-lg fixed-top navbar-dark py-3">
    <div class="container">
      <a class="navbar-brand brand-text" href="index.html" data-i18n="brand"></a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav mx-auto gap-lg-4">
          <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="nav.home"></a></li>
          <li class="nav-item"><a class="nav-link" href="history.html" data-i18n="nav.history"></a></li>
          <li class="nav-item"><a class="nav-link" href="landmarks.html" data-i18n="nav.landmarks"></a></li>
          <li class="nav-item"><a class="nav-link" href="modern.html" data-i18n="nav.modern"></a></li>
          <li class="nav-item"><a class="nav-link" href="about.html" data-i18n="nav.about"></a></li>
        </ul>
        <button id="lang-toggle" type="button" class="btn btn-outline-warning btn-sm px-3 lang-btn"></button>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <header id="home" class="hero d-flex align-items-center text-center text-light">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="container position-relative">
      <h1 class="hero-title mb-4" data-i18n="hero.title"></h1>
      <p class="hero-subtitle mx-auto mb-5" data-i18n="hero.subtitle"></p>
      <a href="#intro" class="btn btn-warning btn-lg px-5 py-3 fw-semibold rounded-1" data-i18n="hero.cta"></a>
    </div>
    <a href="#intro" class="hero-scroll" aria-hidden="true"><i class="bi bi-chevron-down"></i></a>
  </header>

  <!-- Intro -->
  <section id="intro" class="content-section py-6">
    <div class="container">
      <div class="text-center mb-5">
        <span class="accent-line d-inline-block mb-3"></span>
        <h2 class="section-title mb-4" data-i18n="intro.title"></h2>
      </div>
      <p class="section-subtitle text-center" data-i18n="intro.desc"></p>
    </div>
  </section>

  <!-- Stats -->
  <section class="content-section section-alt py-6">
    <div class="container">
      <div class="text-center mb-5">
        <span class="accent-line d-inline-block mb-3"></span>
        <h2 class="section-title" data-i18n="stats.title"></h2>
      </div>
      <div class="row g-4">
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-number"><span data-counter="7000">0</span>+</div>
            <div class="stat-label" data-i18n="stats.years"></div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-number"><span data-counter="6650">0</span></div>
            <div class="stat-label" data-i18n="stats.nile"></div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-number"><span data-counter="3">0</span></div>
            <div class="stat-label" data-i18n="stats.pyramids"></div>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-number"><span data-counter="7">0</span></div>
            <div class="stat-label" data-i18n="stats.unesco"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Ancient -->
  <section id="ancient" class="content-section py-6">
    <div class="container">
      <div class="row align-items-center g-5">
        <div class="col-lg-6">
          <div class="section-image shadow-lg">
            <img src="luxor.png" alt="Luxor" class="img-fluid" />
          </div>
        </div>
        <div class="col-lg-6">
          <span class="accent-line d-block mb-4"></span>
          <h2 class="section-title mb-4" data-i18n="ancient.title"></h2>
          <p class="section-text" data-i18n="ancient.desc"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Nile -->
  <section id="nile" class="content-section section-alt py-6">
    <div class="container">
      <div class="row align-items-center g-5 flex-row-reverse">
        <div class="col-lg-6">
          <div class="section-image shadow-lg">
            <img src="nile.png" alt="The Nile" class="img-fluid" />
          </div>
        </div>
        <div class="col-lg-6">
          <span class="accent-line d-block mb-4"></span>
          <h2 class="section-title mb-4" data-i18n="nile.title"></h2>
          <p class="section-text" data-i18n="nile.desc"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Modern -->
  <section id="modern" class="content-section py-6">
    <div class="container">
      <div class="row align-items-center g-5">
        <div class="col-lg-6">
          <div class="section-image shadow-lg">
            <img src="gem.png" alt="Grand Egyptian Museum" class="img-fluid" />
          </div>
        </div>
        <div class="col-lg-6">
          <span class="accent-line d-block mb-4"></span>
          <h2 class="section-title mb-4" data-i18n="modern.title"></h2>
          <p class="section-text" data-i18n="modern.desc"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- People -->
  <section id="people" class="content-section section-alt py-6">
    <div class="container">
      <div class="row align-items-center g-5 flex-row-reverse">
        <div class="col-lg-6">
          <div class="section-image shadow-lg">
            <img src="flag.png" alt="Egyptian Flag" class="img-fluid" />
          </div>
        </div>
        <div class="col-lg-6">
          <span class="accent-line d-block mb-4"></span>
          <h2 class="section-title mb-4" data-i18n="people.title"></h2>
          <p class="section-text" data-i18n="people.desc"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Gallery -->
  <section id="gallery" class="content-section py-6">
    <div class="container">
      <div class="text-center mb-5">
        <span class="accent-line d-inline-block mb-3"></span>
        <h2 class="section-title" data-i18n="gallery.title"></h2>
      </div>
      <div class="row g-3">
        <div class="col-12 col-md-6 col-lg-4"><div class="gallery-card shadow"><img src="abusimbel.png" alt="Abu Simbel" class="img-fluid"/></div></div>
        <div class="col-12 col-md-6 col-lg-4"><div class="gallery-card shadow"><img src="cairo.png" alt="Cairo" class="img-fluid"/></div></div>
        <div class="col-12 col-md-6 col-lg-4"><div class="gallery-card shadow"><img src="luxor.png" alt="Luxor" class="img-fluid"/></div></div>
        <div class="col-12 col-md-6 col-lg-4"><div class="gallery-card shadow"><img src="nile.png" alt="Nile" class="img-fluid"/></div></div>
        <div class="col-12 col-md-6 col-lg-4"><div class="gallery-card shadow"><img src="gem.png" alt="GEM" class="img-fluid"/></div></div>
        <div class="col-12 col-md-6 col-lg-4"><div class="gallery-card shadow"><img src="hero.png" alt="Pyramids" class="img-fluid"/></div></div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer py-5 text-center">
    <div class="container">
      <p class="footer-main m-0" data-i18n="footer.text"></p>
      <div class="footer-credit">
        <p data-i18n="by.text"></p>
        <p data-i18n="j6.text"></p>
        <p data-i18n="school.text"></p>
        <p data-i18n="leader_school.text"></p>
      </div>
    </div>
  </footer>

  <!-- Background music (continues across pages via localStorage) -->
  <audio id="bg-music" src="song.mp3" loop preload="auto" style="display:none"></audio>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

</html>
